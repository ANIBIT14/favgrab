<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#04040c"/>
  <!-- Outer diamond -->
  <polygon points="32,6 58,32 32,58 6,32" fill="none" stroke="#f5a623" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="32,18 46,32 32,46 18,32" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4.5" fill="#f5a623"/>
  <!-- Corner dots at diamond vertices -->
  <circle cx="32" cy="6" r="2" fill="#f5a623"/>
  <circle cx="58" cy="32" r="2" fill="#f5a623"/>
  <circle cx="32" cy="58" r="2" fill="#f5a623"/>
  <circle cx="6" cy="32" r="2" fill="#f5a623"/>
</svg>
